services:
  postgres:
    image: postgres:16
    container_name: flowdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowdesk
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk123
    ports:
      - "5432:5432"
    volumes:
      - flowdesk_postgres_data:/var/lib/postgresql/data

volumes:
  flowdesk_postgres_data: